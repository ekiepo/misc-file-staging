<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekiepo DAS — User & Data Flow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:1.5rem;max-width:780px;margin:0 auto;background:#fff;color:#1a1a1a}
.step-nav{display:flex;gap:4px;margin:0 0 1.5rem;flex-wrap:wrap}
.step-pill{font-size:12px;padding:5px 12px;border-radius:8px;border:0.5px solid #ddd;background:transparent;cursor:pointer;color:#666;transition:all .15s}
.step-pill.active{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.step-pill:hover:not(.active){background:#f5f5f3}
.phase-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.25rem;margin:0 0 1rem}
.phase-title{font-size:18px;font-weight:500;margin:0 0 4px}
.phase-sub{font-size:13px;color:#666;margin:0 0 1rem}
.lane{display:flex;gap:12px;margin:0 0 12px;align-items:flex-start}
.lane-label{font-size:11px;font-weight:500;color:#666;min-width:60px;padding-top:6px;text-transform:uppercase;letter-spacing:0.5px}
.lane-content{flex:1;display:flex;flex-wrap:wrap;gap:8px}
.action-chip{font-size:13px;padding:6px 12px;border-radius:8px;line-height:1.3}
.chip-admin{background:#E6F1FB;color:#0C447C}
.chip-buyer{background:#E1F5EE;color:#085041}
.chip-vendor{background:#FAEEDA;color:#633806}
.chip-system{background:#F1EFE8;color:#444441}
.data-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#666;padding:4px 0}
.data-row .coll{font-family:'SF Mono',Consolas,monospace;font-size:11px;padding:2px 6px;border-radius:4px;background:#f5f5f3}
.arrow-label{font-size:12px;color:#999;padding:8px 0 4px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:0 0 1rem;font-size:12px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}
.step-panel{display:none}
.step-panel.visible{display:block}
h1{font-size:20px;font-weight:500;margin:0 0 0.5rem}
.subtitle{font-size:13px;color:#666;margin:0 0 1.5rem}
@media(prefers-color-scheme:dark){
body{background:#1a1a1a;color:#e0e0e0}
.phase-card{background:#222;border-color:#444}
.step-pill{border-color:#444;color:#999}
.step-pill.active{background:#0C447C;color:#B5D4F4;border-color:#378ADD}
.step-pill:hover:not(.active){background:#2a2a2a}
.chip-admin{background:#0C447C;color:#B5D4F4}
.chip-buyer{background:#085041;color:#9FE1CB}
.chip-vendor{background:#633806;color:#FAC775}
.chip-system{background:#444441;color:#D3D1C7}
.data-row .coll{background:#333}
.phase-sub,.lane-label,.data-row,.arrow-label,.legend,.subtitle{color:#999}
}
</style>
</head>
<body>

<h1>Ekiepo DAS — User & data flow</h1>
<p class="subtitle">Click each phase to see who does what and which Firestore collections are touched.</p>

<div class="legend">
<span><span class="legend-dot" style="background:#378ADD"></span> Admin</span>
<span><span class="legend-dot" style="background:#1D9E75"></span> Buyer</span>
<span><span class="legend-dot" style="background:#EF9F27"></span> Vendor</span>
<span><span class="legend-dot" style="background:#888780"></span> System</span>
</div>

<div class="step-nav" id="nav"></div>
<div id="panels"></div>

<script>
const steps = [
{id:'rfp', title:'1. RFP creation', sub:'Buyer posts structured RFP with new DAS fields',
lanes:[
{actor:'Buyer',chips:['Fills RFP form (existing flow)','Adds success criteria (new)','Selects integrations (new)','Sets data readiness (new)','Picks deliverables + eval preference']},
{actor:'System',chips:['Stores responses in rfp_submissions_responses','Publishes to rfp_submissions']}
],
data:['rfp_templates → rfp_steps (template drives form)','rfps → rfp_submissions (draft → published)','rfp_submissions_responses (buyer answers per step)']},

{id:'preview', title:'2. Gate preview generated', sub:'Admin creates preliminary gate matrix before vendors see RFP',
lanes:[
{actor:'System',chips:['Auto-detects complexity tier from RFP data','Generates preliminary gates from RFP fields','Creates draft DAD (no proposal data yet)']},
{actor:'Admin',chips:['Reviews preliminary gates','Adjusts tier if needed','Attaches preview to RFP']}
],
data:['gate_templates (library lookup)','delivery_assurance_documents (status: draft)','received_rfps.gate_preview_ref (links preview to vendor view)']},

{id:'vendor', title:'3. Vendor responds', sub:'Vendor sees gate preview, decides to respond, fills proposal with differentiation fields',
lanes:[
{actor:'Vendor',chips:['Browses RFP + sees gate preview (summary + detail)','Fills proposal form (existing flow)','Adds eval methodology (new — differentiation)','Adds benchmark methodology (new)','Structures delivery phases (new — replaces long text)','Sets payment % per phase (must sum to 100%)']},
{actor:'System',chips:['Stores responses in proposal_submissions_responses','Creates proposal_submissions doc']}
],
data:['received_rfps (vendor reads gate preview)','proposal_templates → proposal_steps (template drives form)','proposal_submissions + proposal_submissions_responses']},

{id:'dad', title:'4. DAD generation', sub:'Admin generates full Delivery Assurance Document per vendor per proposal',
lanes:[
{actor:'System',chips:['Reads RFP responses → RFP-derived gates','Reads proposal responses → proposal-derived gates','Applies tier defaults (required / recommended / skipped)','Maps gates to stages via stage affinity','Calculates escrow split from payment percentages']},
{actor:'Admin',chips:['Reviews auto-generated DAD','Can add / remove / adjust gates','Can override complexity tier','Finalizes DAD → status: attached_to_rfp','Releases proposals + DADs to buyer']}
],
data:['rfp_submissions_responses (gate trigger conditions)','proposal_submissions_responses (vendor commitments)','delivery_assurance_documents (created, 1 per vendor)','dad_stages (1 per vendor delivery phase)','gate_instances (gates mapped to stages)','dad_audit_trail (every action logged)']},

{id:'compare', title:'5. Buyer reviews + compares', sub:'Buyer sees proposals with gate comparison — the "Best Buy effect"',
lanes:[
{actor:'Buyer',chips:['Opens proposal detail → two tabs','Tab 1: project plan (existing phases/tasks/hours)','Tab 2: delivery assurance (stages, gates, escrow)','Opens compare view → three sections','Sec 1: vendor profile (existing)','Sec 2: proposal comparison (existing + new fields)','Sec 3: gate comparison (new — the moat)','Prepares meeting questions from gate data']},
{actor:'Admin',chips:['Hosts intro meeting on platform']}
],
data:['delivery_assurance_documents (queried by rfp_ref for compare)','dad_stages + gate_instances (gate details per vendor)','proposal_submissions_responses (commitment data)']},

{id:'select', title:'6. Vendor selected → project activates', sub:'Buyer picks vendor, project created, escrow seeding begins',
lanes:[
{actor:'Buyer',chips:['Selects vendor','Funds Phase 1 escrow (phase % × buyer total)']},
{actor:'Admin',chips:['Creates project','Links DAD to project','DAD status → active']},
{actor:'System',chips:['Creates projects doc with dad_ref','Phase 1 escrow_transaction (type: seed)','Stage 1 escrow_status → seeded']}
],
data:['projects (created — rfp_ref, proposal_ref, dad_ref)','project_users (join table for access control)','delivery_assurance_documents.project_ref (set now)','escrow_transactions (first seed recorded)','dad_audit_trail (project activated)']},

{id:'execute', title:'7. Execution — gate cycle', sub:'Vendor works, submits evidence, admin reviews, escrow releases',
lanes:[
{actor:'Vendor',chips:['Works on current phase tasks','Submits evidence per gate (uploads to Firebase Storage)','Gate status → submitted']},
{actor:'Admin',chips:['Reviews evidence for each gate','Pass → gate status: passed + notes','Fail → gate status: failed + notes (vendor resubmits)','Waive → gate status: waived + rationale logged','When all stage gates pass → triggers escrow release']},
{actor:'System',chips:['Updates gate_instances status','Creates escrow_transaction (type: release)','Stage escrow_status → released','Deducts 30% Ekiepo margin','Logs all actions to audit trail']},
{actor:'Buyer',chips:['Views gate status (read-only)','Sees escrow releases','Prompted to seed next phase']}
],
data:['gate_instances (status: pending → submitted → passed/failed)','escrow_transactions (release per stage)','dad_audit_trail (every review action)','Firebase Storage (evidence files)']},

{id:'complete', title:'8. Project complete', sub:'All stages done, final escrow released, audit trail preserved',
lanes:[
{actor:'Admin',chips:['Confirms all stages complete','Releases final escrow','DAD status → completed','Project status → completed']},
{actor:'System',chips:['Final escrow_transaction','DAD audit trail sealed','Review record can be created']},
{actor:'Buyer',chips:['Sees completed project with full gate history','Can rate vendor (review collection)']},
{actor:'Vendor',chips:['Receives final payment','Full gate history serves as portfolio evidence']}
],
data:['delivery_assurance_documents (status: completed)','escrow_transactions (all phases released)','dad_audit_trail (complete record)','review (optional — rating + project_reference)']}
];

const nav = document.getElementById('nav');
const panels = document.getElementById('panels');

steps.forEach((s,i) => {
const pill = document.createElement('button');
pill.className = 'step-pill' + (i===0?' active':'');
pill.textContent = s.title.split('.')[0].trim() + '. ' + s.title.split('.')[1]?.trim().split(' ').slice(0,2).join(' ');
pill.onclick = () => showStep(i);
nav.appendChild(pill);

const panel = document.createElement('div');
panel.className = 'step-panel' + (i===0?' visible':'');
panel.id = 'panel-'+i;

let html = '<div class="phase-card">';
html += '<p class="phase-title">'+s.title+'</p>';
html += '<p class="phase-sub">'+s.sub+'</p>';

s.lanes.forEach(l => {
const cls = l.actor==='Admin'?'chip-admin':l.actor==='Buyer'?'chip-buyer':l.actor==='Vendor'?'chip-vendor':'chip-system';
html += '<div class="lane"><div class="lane-label">'+l.actor+'</div><div class="lane-content">';
l.chips.forEach(c => { html += '<span class="action-chip '+cls+'">'+c+'</span>'; });
html += '</div></div>';
});

html += '<div class="arrow-label">Firestore collections touched:</div>';
s.data.forEach(d => {
const parts = d.split(' (');
html += '<div class="data-row"><span class="coll">'+parts[0]+'</span>';
if(parts[1]) html += ' <span>('+parts[1]+'</span>';
html += '</div>';
});

html += '</div>';
panel.innerHTML = html;
panels.appendChild(panel);
});

function showStep(idx){
document.querySelectorAll('.step-pill').forEach((p,i) => p.classList.toggle('active',i===idx));
document.querySelectorAll('.step-panel').forEach((p,i) => p.classList.toggle('visible',i===idx));
}
</script>
</body>
</html>
